openapi: 3.0.3
info:
  title: Adodas API
  description: |
    API REST completa para gestión de **clientes, ítems, pedidos, reembolsos y servicios**.
    
    ## ✨ Características:
    - ✅ **CRUD completo** todos los recursos
    - ✅ **Validaciones robustas** (DNI, emails, precios)
    - ✅ **Filtros avanzados** por estado, precio, cliente
    - ✅ **Errores específicos** 400/404/500 diferenciados
    - ✅ **Ejemplos reales** en todas las respuestas
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Desarrollo Local

tags:
  - name: CUSTOMERS
    description: 👥 Gestión de clientes
  - name: ITEMS
    description: 📦 Catálogo de productos
  - name: ORDERS
    description: 🛒 Pedidos y entregas
  - name: REFUNDS
    description: 💰 Reembolsos
  - name: SERVICES
    description: 🔧 Servicios profesionales

components:
  schemas:
    ErrorResponseDto:
      type: object
      properties:
        code:
          type: integer
          description: Código HTTP del error
        message:
          type: string
          description: Descripción del error
      required: [ code, message ]

    CustomerDto:
      type: object
      properties:
        name:
          type: string
          example: "Juan"
        surname:
          type: string
          example: "Pérez"
        dni:
          type: string
          pattern: '^\d{8}[A-Z]$'
          example: "12345678A"
        email:
          type: string
          format: email
          example: "juan.perez@email.com"
        isEmailConfirmed:
          type: boolean
          example: true
        registerDate:
          type: string
          format: date
          readOnly: true
          example: "2026-01-15"

    ItemDto:
      type: object
      properties:
        name:
          type: string
          example: "Camiseta Nike Sport"
        brand:
          type: string
          example: "Nike"
        price:
          type: number
          format: float
          minimum: 0
          example: 29.99
        category:
          $ref: '#/components/schemas/CategoryEnum'
        stock:
          type: integer
          minimum: 0
          example: 150
        description:
          type: string
          example: "Camiseta de algodón 100% transpirable"
        createdDate:
          type: string
          format: date-time
          readOnly: true
          example: "2026-01-15T10:30:00Z"

    CategoryEnum:
      type: string
      enum: [ SHOES, TROUSERS, SWEATER, SHIRTS ]
      example: "SHIRTS"
    OrderDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 101
        customerId:
          type: integer
          format: int64
          example: 12
        items:
          type: array
          description: Lista de IDs de ítems incluidos en el pedido
          items:
            type: integer
            format: int64
          example: [ 3, 14, 22 ]
        orderPrice:
          type: number
          format: float
          minimum: 0
          example: 79.85
        delivered:
          type: boolean
          example: false
    RefundDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 25
        reason:
          type: string
          description: Motivo del reembolso.
          example: "Producto defectuoso"
        refundDate:
          type: string
          format: date
          description: Fecha en la que se realizó el reembolso.
          example: "2026-01-28"
        amount:
          type: number
          format: float
          minimum: 0
          description: Importe total del reembolso.
          example: 49.99
        orderId:
          type: integer
          format: int64
          description: ID del pedido relacionado.
          example: 320
        customerId:
          type: integer
          format: int64
          description: ID del cliente que recibe el reembolso.
          example: 8
        approved:
          type: boolean
          description: Indica si el reembolso fue aprobado.
          example: true
      required: [ reason, refundDate, amount ]
    ServiceDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 42
        name:
          type: string
          description: Nombre del servicio de la tienda.
          example: "Dobladillo de pantalones"
        description:
          type: string
          description: Descripción del servicio de ropa.
          example: "Ajuste profesional de dobladillo para pantalones vaqueros o vestir"
        price:
          type: number
          format: float
          minimum: 0
          description: Precio del servicio.
          example: 12.50
        availableFrom:
          type: string
          format: date
          description: Fecha desde la que está disponible.
          example: "2026-02-01"
        availableTo:
          type: string
          format: date
          description: Fecha hasta la que está disponible.
          example: "2026-12-31"
        isActive:
          type: boolean
          description: Indica si el servicio está disponible.
          example: true
        customerId:
          type: integer
          format: int64
          description: ID del cliente asociado (opcional).
          example: 15
        notes:
          type: string
          description: Notas adicionales del servicio.
          example: "Servicio exprés disponible (+5€)"
      required: [ name, price ]
    CustomerV2Dto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 10
        name:
          type: string
          description: Nombre del cliente.
          example: Juan
        email:
          type: string
          format: email
          description: Correo electrónico del cliente.
          example: juan.perez@example.com
        phone:
          type: string
          description: Teléfono del cliente.
          example: "+34 600 123 456"
      required:
        - name
        - email
        - phone



paths:
  /v1/customers:
    get:
      tags: [ CUSTOMERS ]
      summary: Lista todos los clientes
      description: Obtiene una lista paginada o filtrada de clientes registrados.
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Filtra por nombre del cliente.
        - name: email
          in: query
          required: false
          schema:
            type: string
          description: Filtra por email del cliente.
        - name: surname
          in: query
          required: false
          schema:
            type: string
          description: Filtra por apellido del cliente.
      responses:
        '200':
          description: Lista de clientes obtenida correctamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerDto'
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"

    post:
      tags: [ CUSTOMERS ]
      summary: Crea un nuevo cliente
      description: Registra un nuevo cliente validando DNI, email y formato de datos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerDto'
      responses:
        '201':
          description: Cliente creado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDto'
        '400':
          description: Error de validación en los datos proporcionados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 400
                message: "Validation failed"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"

  /v1/customers/{customerId}:
    get:
      tags: [ CUSTOMERS ]
      summary: Obtiene un cliente por su ID
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID del cliente.
      responses:
        '200':
          description: Cliente encontrado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDto'
        '404':
          description: Cliente no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 404
                message: "Cliente no encontrado"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"

    put:
      tags: [ CUSTOMERS ]
      summary: Modifica un cliente existente
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID del cliente a modificar.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerDto'
      responses:
        '200':
          description: Cliente modificado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDto'
        '400':
          description: Error de validación en los datos proporcionados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 400
                message: "Validation failed"
        '404':
          description: Cliente no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 404
                message: "Cliente no encontrado"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"

    patch:
      tags: [ CUSTOMERS ]
      summary: Actualiza parcialmente un cliente
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID del cliente a actualizar parcialmente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example:
                email: "nuevo.email@email.com"
      responses:
        '200':
          description: Cliente actualizado parcialmente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDto'
        '400':
          description: Error de validación o cuerpo inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 400
                message: "Validation failed"
        '404':
          description: Cliente no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 404
                message: "Cliente no encontrado"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"

    delete:
      tags: [ CUSTOMERS ]
      summary: Elimina un cliente
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID del cliente a eliminar.
      responses:
        '204':
          description: Cliente eliminado correctamente (sin contenido en la respuesta).
        '404':
          description: Cliente no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 404
                message: "Cliente no encontrado"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"
  /v2/customers:
    get:
      tags: [ CUSTOMERS ]
      summary: Lista todos los clientes v2
      description: Obtiene una lista paginada de clientes usando page y size.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Número de página, empezando en 0.
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 5
          description: Tamaño de página.
      responses:
        '200':
          description: Lista de clientes obtenida correctamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerDto'
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"

    post:
      tags: [ CUSTOMERS ]
      summary: Crea un nuevo cliente v2
      description: Registra un cliente usando el contrato v2 con phone obligatorio.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerV2Dto'
      responses:
        '201':
          description: Cliente creado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerV2Dto'
        '400':
          description: Error de validación en los datos proporcionados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 400
                message: "Validation failed"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"

  /v2/customers/{id}:
    put:
      tags: [ CUSTOMERS ]
      summary: Actualiza un cliente v2
      description: Solo permite modificar email y surname.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID del cliente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example:
                email: nuevo@email.com
                surname: García
      responses:
        '200':
          description: Cliente actualizado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDto'
        '404':
          description: Cliente no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 404
                message: "Cliente no encontrado"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"

    delete:
      tags: [ CUSTOMERS ]
      summary: Elimina un cliente v2
      description: Simula un soft delete y devuelve un mensaje de confirmación.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID del cliente.
      responses:
        '200':
          description: Cliente marcado como eliminado correctamente.
          content:
            text/plain:
              schema:
                type: string
              example: Customer with id 10 marked as deleted (soft delete in v2)
        '404':
          description: Cliente no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 404
                message: "Cliente no encontrado"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"
  /items:
    get:
      tags: [ ITEMS ]
      summary: Lista todos los ítems
      description: Obtiene una lista de ítems con filtros opcionales por marca, categoría o precio.
      parameters:
        - name: brand
          in: query
          required: false
          schema:
            type: string
          description: Filtra por marca del ítem.
        - name: category
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/CategoryEnum'
          description: Filtra por categoría del ítem.
        - name: price
          in: query
          required: false
          schema:
            type: number
            format: float
          description: Filtra por precio exacto del ítem.
      responses:
        '200':
          description: Lista de ítems obtenida correctamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemDto'
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"

    post:
      tags: [ ITEMS ]
      summary: Crea un nuevo ítem
      description: Registra un nuevo ítem en el catálogo validando precio y categoría.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemDto'
      responses:
        '201':
          description: Ítem creado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDto'
        '400':
          description: Error de validación en los datos proporcionados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 400
                message: "Validation failed"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"

  /items/{itemId}:
    get:
      tags: [ ITEMS ]
      summary: Obtiene un ítem por su ID
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID del ítem.
      responses:
        '200':
          description: Ítem encontrado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDto'
        '404':
          description: Ítem no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 404
                message: "Ítem no encontrado"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"

    put:
      tags: [ ITEMS ]
      summary: Modifica un ítem existente
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID del ítem a modificar.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemDto'
      responses:
        '200':
          description: Ítem modificado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDto'
        '400':
          description: Error de validación en los datos proporcionados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 400
                message: "Validation failed"
        '404':
          description: Ítem no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 404
                message: "Ítem no encontrado"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"

    patch:
      tags: [ ITEMS ]
      summary: Actualiza parcialmente un ítem
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID del ítem a actualizar parcialmente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example:
                price: 35.99
                stock: 200
      responses:
        '200':
          description: Ítem actualizado parcialmente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDto'
        '400':
          description: Error de validación o cuerpo inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 400
                message: "Validation failed"
        '404':
          description: Ítem no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 404
                message: "Ítem no encontrado"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"

    delete:
      tags: [ ITEMS ]
      summary: Elimina un ítem
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID del ítem a eliminar.
      responses:
        '204':
          description: Ítem eliminado correctamente (sin contenido en la respuesta).
        '404':
          description: Ítem no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 404
                message: "Ítem no encontrado"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"
  /orders:
    get:
      tags: [ ORDERS ]
      summary: Lista todos los pedidos
      description: Obtiene pedidos con filtros opcionales por estado de entrega o rango de precio.
      parameters:
        - name: delivered
          in: query
          schema:
            type: boolean
          description: Filtra por pedidos entregados o pendientes.
        - name: minPrice
          in: query
          schema:
            type: number
            format: float
            minimum: 0
          description: Precio mínimo de los pedidos.
        - name: maxPrice
          in: query
          schema:
            type: number
            format: float
            minimum: 0
          description: Precio máximo de los pedidos.
      responses:
        '200':
          description: Lista de pedidos obtenida correctamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderDto'
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"

    post:
      tags: [ ORDERS ]
      summary: Crea un nuevo pedido
      description: Registra un nuevo pedido con validaciones de total y cliente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderDto'
      responses:
        '201':
          description: Pedido creado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDto'
        '400':
          description: Error de validación en los datos proporcionados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 400
                message: "Validation failed"
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
              example:
                code: 500
                message: "Error interno del servidor"

  /orders/{orderId}:
    put:
      tags: [ ORDERS ]
