name: Run Postman Integration Tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build project
        run: mvn clean install -DskipTests

      - name: Run API
        run: |
          nohup mvn spring-boot:run > app.log 2>&1 &
          echo $! > app.pid
          sleep 20

      - name: Check API logs
        run: cat app.log

      - name: Wait for API on 8081
        run: |
          echo "Waiting for API on http://localhost:8081..."
          for i in {1..30}; do
            if curl -fsS http://localhost:8081/health > /dev/null 2>&1; then
              echo "API is up!"
              exit 0
            fi
            echo "Waiting..."
            sleep 5
          done
          echo "API did not start"
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman collection
        run: newman run postman/collection.json --env-var baseUrl=http://localhost:8081 --reporters cli --verbose

      - name: Show logs if failed
        if: failure()
        run: cat app.log
