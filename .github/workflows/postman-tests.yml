name: Run Postman Tests

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build project
        run: mvn clean install -DskipTests

      - name: Run API
        run: |
          nohup mvn spring-boot:run > app.log 2>&1 &

      - name: Wait for API
        run: |
          echo "Waiting for API..."
          for i in {1..40}; do
            if curl -s http://localhost:8081/services > /dev/null; then
              echo "API is up!"
              break
            fi
            echo "Waiting..."
            sleep 3
          done

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman collection
        run: newman run postman/collection.json --env-var baseUrl=http://localhost:8081 --reporters cli --verbose

      - name: Show logs if failed
        if: failure()
        run: cat app.logan/collection.json --env-var baseUrl=http://localhost:8081