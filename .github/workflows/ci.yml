name: Spring Boot CI

on:
  push:
    branches:
      - develop
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: adodas
          MARIADB_DATABASE: adodas
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -padodas --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Wait for MariaDB
        env:
          PORT: ${{ job.services.mariadb.ports[3306] }}
        run: |
          echo "MariaDB host port: $PORT"
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P "$PORT" -uroot -padodas --silent; then
              echo "MariaDB is ready"
              exit 0
            fi
            echo "Waiting for MariaDB..."
            sleep 2
          done
          echo "MariaDB did not become ready"
          exit 1

      - name: Build
        run: mvn -B clean package -DskipTests

      - name: Start app
        run: mvn spring-boot:run

      - name: Wait for app
        run: |
          echo "Waiting for API on http://127.0.0.1:8081..."
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8081/ > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting..."
            sleep 2
          done
          echo "App did not start"
          exit 1

      - name: Run Postman tests
        run: |
          npx newman run postman/collection.json --environment postman/dev.postman_environment.json